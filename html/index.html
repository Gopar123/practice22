<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Walk Abuja</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="con1">
                <div class="logo">
                    <img src="/img/ori.png" alt="logo">
                    <h1>CITY WALK</h1>
                </div>

                <div class="btn1">
                        <select class="items1">
                            <option class="pro">Product</option>
                            <option class="res">Residence</option>
                            <option class="lei">Leisure</option>
                            <option class="house">Housing</option>
                        </select>
                </div>
            </div>

            <div class="con2">
                <div class="btn2">
                            <select class="items2">
                                <option class="com">Company</option>
                                <option class="res">MAG</option>
                                <option class="lei">SWG</option>
                                <option class="house">PayFixy</option>
                            </select>
                </div>
                <a href="#">Pricing</a>
                <a href="#">For Accountants</a>
            </div>

            <div class="con3">
                <a href="#">Login</a>
                <a id="btn3" href="#">Get Started</a>
            </div>
        </nav>
    </header>

   
    <main>
                <div class="con4">
                    <h1 class="head">Discover the Best of Abuja with City Walk</h1>
                    <p class="hero">Explore the vibrant culture, rich history, and exciting entertainment options that make Abuja a must-visit destination.</p>
                    <a href="#" class="btn4">Get Started</a>
                    <a href="#" class="btn5">Talk to a human</a>
                </div>
    </main>
</body>
</html>
